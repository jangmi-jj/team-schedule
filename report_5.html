<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAB 설비 진행 현황</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4F46E5; --primary-light: #EEF2FF;
      --danger: #EF4444; --success: #10B981; --warning: #F59E0B;
      --bg: #F8FAFC; --card: #FFFFFF;
      --text: #1E293B; --muted: #94A3B8; --border: #E2E8F0;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .hidden { display: none !important; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #4338CA; }
    .btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
    .btn-outline:hover { background: var(--primary-light); }
    input, textarea { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; background: #fff; color: var(--text); outline: none; }
    input:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; }

    .app-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 10px; flex-wrap: wrap; }
    .app-header h1 { font-size: 17px; font-weight: 800; color: var(--primary); white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    .modal-box { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; }
    .modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--muted); }
    .form-group input { width: 100%; }

    .main-content { padding: 16px 20px; max-width: 1600px; margin: 0 auto; }
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
    .summary-card .num { font-size: 26px; font-weight: 800; }
    .summary-card .lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* URL 잠금 배너 */
    .lock-banner { background: #EEF2FF; border: 1px solid #C7D2FE; border-radius: 10px; padding: 10px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .lock-banner .lock-fabs { font-weight: 700; color: var(--primary); }

    /* FAB 관리 패널 */
    .fab-manage { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 16px; }
    .fab-manage-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; padding: 4px 0; }
    .fab-manage-title:hover { opacity: 0.75; }
    .fab-manage-chevron { margin-left: auto; font-size: 11px; color: var(--muted); transition: transform .25s; }
    .fab-manage-body { overflow: hidden; max-height: 0; transition: max-height .3s ease, opacity .25s ease, margin-top .25s; opacity: 0; margin-top: 0; }
    .fab-manage-body.open { max-height: 300px; opacity: 1; margin-top: 10px; }
    .fab-toggle-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .fab-toggle-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; color: var(--muted); }
    .fab-toggle-btn.visible { background: var(--primary); color: #fff; border-color: var(--primary); }
    .fab-manage-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* 테이블 */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: #fff; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 800px; }
    thead tr { background: #4F46E5; color: #fff; }
    thead th { padding: 9px 6px; text-align: center; border: 1px solid #6366F1; font-weight: 700; white-space: nowrap; cursor: default; }
    thead th.th-left { text-align: left; padding-left: 12px; }
    thead th.th-stage { cursor: pointer; }
    thead th.th-stage:hover { background: #4338CA; }
    thead th.th-sub { background: #6D28D9; border-color: #7C3AED; font-size: 10px; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr.fab-row { cursor: pointer; }
    tbody tr.fab-row:hover { background: #F8FAFC; }
    tbody tr.fab-row.status-red { background: #FFF5F5; }
    tbody tr.fab-row.status-red:hover { background: #FEE2E2; }
    tbody tr.fab-row.status-red td { border-color: #FECACA; }
    tbody td { padding: 8px 6px; text-align: center; border: 1px solid #F1F5F9; vertical-align: middle; }
    tbody td.td-left { text-align: left; padding-left: 12px; }
    tbody tr.unit-row { background: #FAFAFA; }
    tbody tr.unit-row td { font-size: 11px; }
    tbody tr.unit-row.unit-issue { background: #FFF5F5; }
    tbody tr.unit-row.unit-issue td { border-color: #FECACA; }
    tbody tr.unit-row.unit-issue:hover { background: #FEE2E2; }
    tbody tr.total-row { background: #F0FDF4; font-weight: 700; }

    .signal { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; border: none; background: none; }
    .signal-green { background: #D1FAE5; color: #065F46; }
    .signal-red { background: #FEE2E2; color: #991B1B; }
    .signal.clickable { cursor: pointer; }
    .pct-bar { background: #E2E8F0; border-radius: 99px; height: 4px; margin-top: 3px; }
    .pct-fill { height: 4px; border-radius: 99px; }
    .edit-btn { background: none; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 10px; padding: 2px 6px; color: var(--muted); font-weight: 600; }
    .edit-btn:hover { border-color: var(--primary); color: var(--primary); }
    .save-btn { background: var(--primary); border: none; border-radius: 5px; cursor: pointer; font-size: 10px; padding: 3px 7px; color: #fff; font-weight: 600; }
    .cancel-btn { background: none; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 10px; padding: 3px 7px; color: var(--muted); }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

    @keyframes blink-warn {
      0%,100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    @media print {
      .app-header .header-right, .fab-manage, .lock-banner .btn, .edit-btn, .save-btn, .cancel-btn { display: none !important; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <h1>📊 FAB 설비 진행 현황</h1>
  <div class="header-right">
    <span id="last-updated" style="font-size:11px;color:var(--muted)"></span>
    <button class="btn btn-outline" onclick="window.print()">🖨️ 인쇄</button>
    <div id="auth-area"></div>
  </div>
</div>

<!-- 로그인 모달 -->
<div id="login-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3>🔐 관리자 로그인</h3>
    <div class="form-group"><label>이메일</label><input id="login-email" type="email" placeholder="이메일" /></div>
    <div class="form-group"><label>비밀번호</label><input id="login-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <p id="login-error" style="color:#EF4444;font-size:12px;margin-bottom:10px"></p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" style="flex:1" onclick="hideLoginModal()">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="doLogin()">로그인</button>
    </div>
  </div>
</div>

<div class="main-content">
  <div id="main-loading" class="loading">데이터를 불러오는 중...</div>
  <div id="main-content-area" class="hidden">

    <!-- URL 잠금 배너 (URL에 fabs 파라미터 있을 때) -->
    <div id="lock-banner" class="lock-banner hidden">
      🔒 공유된 화면입니다 — 표시 FAB: <span id="lock-fabs" class="lock-fabs"></span>
      <span id="lock-unlock-btn"></span>
    </div>

    <!-- 관리자 FAB 관리 패널 -->
    <div id="fab-manage-panel" class="fab-manage hidden">
      <div class="fab-manage-title" onclick="toggleManagePanel()">
        👁 FAB 표시 설정
        <span style="font-size:11px;font-weight:400;color:var(--muted)">클릭으로 펼치기/접기</span>
        <span class="fab-manage-chevron" id="fab-manage-chevron">▼</span>
      </div>
      <div class="fab-manage-body" id="fab-manage-body">
        <div id="fab-toggle-list" class="fab-toggle-list"></div>
        <div class="fab-manage-actions">
          <button class="btn btn-primary" onclick="copyShareUrl()">🔗 현재 설정으로 URL 복사</button>
          <button class="btn btn-outline" onclick="showAllFabs()">전체 표시</button>
        </div>
        <p id="copy-msg" style="font-size:12px;color:var(--success);margin-top:6px"></p>
      </div>
    </div>

    <div class="summary-cards" id="summary-cards"></div>

    <div style="font-size:14px;font-weight:700;margin-bottom:10px">
      🏭 FAB별 설비 진행 현황
      <span style="font-size:11px;font-weight:400;color:var(--muted);margin-left:6px">FAB명 클릭 → 호기 목록 · 단계 헤더 클릭 → 세부단계</span>
    </div>
    <div class="table-wrap">
      <table id="main-table">
        <thead id="main-thead"></thead>
        <tbody id="main-tbody"><tr><td colspan="14" class="loading">불러오는 중...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lgcgmgqnmbntmwyhqidr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnY2dtZ3FubWJudG13eWhxaWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDgzNTYsImV4cCI6MjA5NjA4NDM1Nn0.6hvhHEECTOuZROlXR0g4tV58Ifbt_DeSr4IQBb2zZz0';

const STAGE_PROGRESS = [0,0,10,25,35,45,55,70,90,100];
const STAGE_NAMES = ['','납품/정위치','다이크/지진브라켓','전기 턴온','인터락테스트','유틸리티 턴온/인증','설비안정화 및 구동','셋업평가','셋업보고서','종료'];
const SUB_STAGES = {
  1:[{id:'1-1',name:'납품'},{id:'1-2',name:'정위치'},{id:'1-3',name:'수평 확인'}],
  2:[{id:'2-1',name:'다이크 납품'},{id:'2-2',name:'다이크 설치'},{id:'2-3',name:'다이크 침수테스트'},{id:'2-4',name:'지진브라켓 설치'}],
  3:[{id:'3-1',name:'전기/LAN 턴온'},{id:'3-2',name:'LAN 통신 확인'}],
  4:[{id:'4-1',name:'인터락테스트'}],
  5:[
    {id:'5-1',name:'유틸리티 턴온',type:'multi',items:['EXH','Bulk','UPW','Drain']},
    {id:'5-2',name:'인증',type:'multi',items:['FOUP 센터/수평','OHT','PIO(E84)']},
  ],
  6:[{id:'6-1',name:'로컬테스트'},{id:'6-2',name:'로봇 티칭'},{id:'6-3',name:'용액 설치 및 안정화'}],
  7:[{id:'7-1',name:'STD 측정 및 Calibration'},{id:'7-2',name:'신뢰성 평가'},{id:'7-3',name:'기타 평가'}],
  8:[],9:[],
};

let sb, currentUser = null;
let allUnits=[], allLogs=[], allSubLogs=[], allTargets=[], allFabStatus={}, allUnitNotes={}, completedStagesByUnit={};

function getCompletedMaxStage(unitId){const s=completedStagesByUnit[unitId];if(!s||s.size===0)return 0;return Math.max(...s);}
function stagePct(unitId){return STAGE_PROGRESS[getCompletedMaxStage(unitId)]||0;}
let expandedFabs = new Set();
let expandedStages = new Set(); // 세부단계 펼침
let visibleFabs = new Set();    // 관리자 설정 표시 FAB
let visibleUnits = null;        // 숨긴 호기 set (unit_id 기준) - null이면 전체 표시
let urlFabs = null;             // URL 파라미터로 지정된 FAB 목록

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getProgressColor(p){if(p===0)return'#94A3B8';if(p<=25)return'#3B82F6';if(p<=55)return'#F59E0B';if(p<100)return'#8B5CF6';return'#10B981';}
function formatDate(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}`;}
function isOverdue(dateStr){if(!dateStr)return false;const today=new Date();today.setHours(0,0,0,0);return new Date(dateStr+'T00:00:00')<today;}
function isNearDeadline(dateStr){if(!dateStr)return false;const today=new Date();today.setHours(0,0,0,0);const target=new Date(dateStr+'T00:00:00');const diff=Math.ceil((target-today)/(1000*60*60*24));return diff>=0&&diff<=3;}
function getDateStatus(dateStr){if(!dateStr)return'none';if(isOverdue(dateStr))return'overdue';if(isNearDeadline(dateStr))return'near';return'ok';}

// ── URL 파라미터 ──
function getUrlFabs(){
  const p=new URLSearchParams(location.search).get('fabs');
  if(p) return p.split(',').map(f=>decodeURIComponent(f.trim())).filter(Boolean);
  // URLSearchParams가 & 때문에 깨지는 경우 raw 파싱으로 fallback
  const raw=location.search;
  const match=raw.match(/[?&]fabs=([^&]*)/);
  if(match) return decodeURIComponent(match[1]).split(',').map(f=>f.trim()).filter(Boolean);
  return null;
}
function buildShareUrl(){
  const shown=[...visibleFabs];
  const base=location.href.split('?')[0];
  return shown.length ? `${base}?fabs=${shown.map(f=>encodeURIComponent(f)).join(',')}` : base;
}
function copyShareUrl(){
  const url=buildShareUrl();
  navigator.clipboard.writeText(url).then(()=>{
    const el=document.getElementById('copy-msg');
    el.textContent='✅ URL이 복사됐어요! — '+url;
    setTimeout(()=>el.textContent='',4000);
  });
}
function showAllFabs(){
  const fabMap=buildFabMap();
  Object.keys(fabMap).forEach(f=>visibleFabs.add(f));
  saveFabVisibility();
  renderFabManagePanel(fabMap);
  renderAll();
}

// ── 인증 ──
function showLoginModal(){document.getElementById('login-modal').classList.remove('hidden');}
function hideLoginModal(){document.getElementById('login-modal').classList.add('hidden');document.getElementById('login-error').textContent='';}
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){document.getElementById('login-error').textContent='로그인 실패: '+error.message;return;}
  currentUser=data.user;
  hideLoginModal();
  updateAuthUI();
  renderAll();
}
async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;
  updateAuthUI();
  renderAll();
}
function toggleManagePanel(){
  const body=document.getElementById('fab-manage-body');
  const chevron=document.getElementById('fab-manage-chevron');
  const isOpen=body.classList.toggle('open');
  chevron.style.transform=isOpen?'rotate(180deg)':'';
}
function updateAuthUI(){
  const area=document.getElementById('auth-area');
  const managePanel=document.getElementById('fab-manage-panel');
  if(currentUser){
    area.innerHTML=`<span style="font-size:11px;color:var(--muted)">${escHtml(currentUser.email)}</span>
      <button class="btn btn-outline" onclick="doLogout()">로그아웃</button>`;
    managePanel.classList.remove('hidden');
  } else {
    area.innerHTML=`<button class="btn btn-outline" onclick="showLoginModal()">🔐 관리자 로그인</button>`;
    managePanel.classList.add('hidden');
  }
}

// ── 데이터 로드 ──
async function loadAll(){
  const [{data:units},{data:logs},{data:subLogs},{data:targets},{data:fabList},{data:unitNotes},{data:stageComps}] = await Promise.all([
    sb.from('equipment_units').select('*').order('created_at'),
    sb.from('work_logs').select('unit_id,stage').not('unit_id','is',null).gt('stage',0),
    sb.from('work_logs').select('unit_id,stage,sub_stage').not('unit_id','is',null).not('sub_stage','is',null),
    sb.from('fab_targets').select('*'),
    sb.from('fab_status').select('*'),
    sb.from('unit_notes').select('*'),
    sb.from('stage_completions').select('unit_id,stage'),
  ]);
  allUnits=units||[];
  allLogs=logs||[];
  allSubLogs=subLogs||[];
  allTargets=targets||[];
  allFabStatus={};
  (fabList||[]).forEach(f=>{allFabStatus[f.fab]=f;});
  allUnitNotes={};
  (unitNotes||[]).forEach(n=>{allUnitNotes[n.unit_id]=n;});
  completedStagesByUnit={};
  (stageComps||[]).forEach(r=>{
    if(!completedStagesByUnit[r.unit_id])completedStagesByUnit[r.unit_id]=new Set();
    completedStagesByUnit[r.unit_id].add(r.stage);
  });
  // hidden_units 파싱 (fab_status에 JSON으로 저장)
  visibleUnits = new Set();
  (fabList||[]).forEach(f=>{
    const hidden = f.hidden_units ? (()=>{try{return JSON.parse(f.hidden_units);}catch(e){return [];}})() : [];
    hidden.forEach(uid => visibleUnits.add(uid));
  });
  document.getElementById('last-updated').textContent='업데이트: '+new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

// ── FAB 가시성 저장/로드 ──
async function loadFabVisibility(fabMap){
  // URL 파라미터 우선
  if(urlFabs){
    visibleFabs=new Set(urlFabs.filter(f=>fabMap[f]));
    return;
  }
  // Supabase에서 visible 설정 로드
  const allFabs=Object.keys(fabMap);
  visibleFabs=new Set();
  allFabs.forEach(f=>{
    const fs=allFabStatus[f];
    // visible 필드가 없거나 true이면 표시
    if(!fs || fs.visible !== false) visibleFabs.add(f);
  });
}
async function saveFabVisibility(){
  if(!currentUser) return;
  const fabMap=buildFabMap();
  const allFabs=Object.keys(fabMap);
  await Promise.all(allFabs.map(fab=>{
    const visible=visibleFabs.has(fab);
    const existing=allFabStatus[fab]||{};
    return sb.from('fab_status').upsert({
      ...existing, fab, visible,
      updated_at:new Date().toISOString()
    },{onConflict:'fab'}).then(({data})=>{
      if(data) allFabStatus[fab]={...(allFabStatus[fab]||{}),fab,visible};
    });
  }));
}

// ── 데이터 계산 ──
function buildFabMap(){
  const maxStageByUnit={};
  allLogs.forEach(l=>{if(!maxStageByUnit[l.unit_id]||l.stage>maxStageByUnit[l.unit_id])maxStageByUnit[l.unit_id]=l.stage;});
  const subStagesByUnit={};
  allSubLogs.forEach(l=>{
    if(!subStagesByUnit[l.unit_id])subStagesByUnit[l.unit_id]=new Set();
    subStagesByUnit[l.unit_id].add(l.sub_stage);
  });
  // 세부단계 완료 판단:
  // 1) stage_completions에 완료 기록 있는 단계 → 해당 단계 세부항목 전체 완료로 간주 (단, 5단계는 work_logs 실기록 우선)
  // 2) work_logs에 sub_stage 기록 없는 단계 → 전부 완료로 간주
  // 3) work_logs에 sub_stage 기록 있는 단계 → 기록된 것만 완료
  function effectiveSubs(unitId){
    const recorded=subStagesByUnit[unitId]||new Set();
    const eff=new Set();
    const completedStages=completedStagesByUnit[unitId]||new Set();
    // stage_completions 기준: 완료된 단계의 세부항목은 모두 완료 처리
    completedStages.forEach(s=>{
      const subs=SUB_STAGES[s]||[];
      if(!subs.length)return;
      subs.forEach(sub=>eff.add(sub.id));
    });
    // work_logs 기준: stage_completions에 없는 단계도 기존 방식으로 처리
    const stagesWithLog=new Set(allLogs.filter(l=>l.unit_id===unitId&&l.stage>0).map(l=>l.stage));
    stagesWithLog.forEach(s=>{
      if(completedStages.has(s))return; // 이미 위에서 처리됨
      const subs=SUB_STAGES[s]||[];
      if(!subs.length)return;
      if(s===5){
        subs.forEach(sub=>{if(recorded.has(sub.id))eff.add(sub.id);});
      } else {
        const hasAny=[...recorded].some(id=>id.startsWith(s+'-')&&!id.includes('::'));
        if(!hasAny)subs.forEach(sub=>eff.add(sub.id));
        else subs.forEach(sub=>{if(recorded.has(sub.id))eff.add(sub.id);});
      }
    });
    return eff;
  }
  const fabMap={};
  allUnits.forEach(u=>{
    const fab=u.fab||'미지정';
    if(!fabMap[fab])fabMap[fab]=[];
    fabMap[fab].push({...u,maxStage:maxStageByUnit[u.id]||0,subStages:effectiveSubs(u.id)});
  });
  return fabMap;
}

// ── 세부단계 토글 ──
function toggleStage(s){
  if(expandedStages.has(s))expandedStages.delete(s);
  else expandedStages.add(s);
  renderAll();
}

// ── FAB 표시 토글 (관리자) ──
function toggleFabVisible(fab){
  if(!currentUser)return;
  if(visibleFabs.has(fab))visibleFabs.delete(fab);
  else visibleFabs.add(fab);
  saveFabVisibility();
  renderFabManagePanel(buildFabMap());
  renderAll();
}

function toggleUnitVisible(unitId, fab){
  if(!currentUser)return;
  if(!visibleUnits) visibleUnits=new Set();
  if(visibleUnits.has(unitId)) visibleUnits.delete(unitId); // 숨김 해제
  else visibleUnits.add(unitId); // 숨김
  saveUnitVisibility(fab);
  renderFabManagePanel(buildFabMap());
  renderAll();
}

function toggleAllUnits(fab, showAll){
  if(!currentUser)return;
  if(!visibleUnits) visibleUnits=new Set();
  const fabMap=buildFabMap();
  const units=fabMap[fab]||[];
  if(showAll){
    units.forEach(u=>visibleUnits.delete(u.id));
  } else {
    units.forEach(u=>visibleUnits.add(u.id));
  }
  saveUnitVisibility(fab);
  renderFabManagePanel(fabMap);
  renderAll();
}

async function saveUnitVisibility(fab){
  if(!currentUser)return;
  const fabMap=buildFabMap();
  const units=fabMap[fab]||[];
  const hiddenIds=units.filter(u=>visibleUnits&&visibleUnits.has(u.id)).map(u=>u.id);
  const existing=allFabStatus[fab]||{};
  const {error}=await sb.from('fab_status').upsert({
    ...existing, fab,
    hidden_units: JSON.stringify(hiddenIds),
    updated_at: new Date().toISOString()
  },{onConflict:'fab'});
  if(!error){
    allFabStatus[fab]={...existing, fab, hidden_units: JSON.stringify(hiddenIds)};
  }
}

            </div>
            <div id="une-${uKey}" style="display:none;min-width:150px" onclick="event.stopPropagation()">
              <label style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;margin-bottom:5px;cursor:pointer;color:${uHasIssue?'#EF4444':'var(--text)'}">
                <input type="checkbox" id="uci-${uKey}" ${uHasIssue?'checked':''} onchange="document.getElementById('uci-label-${uKey}').style.color=this.checked?'#EF4444':'var(--text)'" style="width:14px;height:14px;cursor:pointer;accent-color:#EF4444" />
                <span id="uci-label-${uKey}" style="color:${uHasIssue?'#EF4444':'var(--text)'}">특이사항 발생</span>
              </label>
              <textarea id="uni-${uKey}" style="font-size:11px;min-height:48px;width:100%;margin-bottom:3px">${escHtml(uNoteText)}</textarea>
              <div style="display:flex;gap:4px"><button class="save-btn" onclick="saveUnitNote('${u.id}')">저장</button><button class="cancel-btn" onclick="cancelUnitNote('${u.id}')">취소</button></div>
            </div>`
          :`<div style="min-width:100px">
              ${uHasIssue?'<span style="display:inline-block;background:#FEE2E2;color:#991B1B;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-bottom:3px">⚠️ 특이사항</span>':''}
              <div style="font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-all">${escHtml(uNoteText)||'<span style="color:#CBD5E1">—</span>'}</div>
            </div>`;

        rows+=`<tr class="unit-row${uHasIssue?' unit-issue':''}">
          <td class="td-left" style="padding-left:24px">
            <div style="font-size:11px;font-weight:700;color:${uColor}">${escHtml(u.name)}</div>
            ${u.location?`<div style="font-size:10px;color:var(--muted)">${escHtml(u.location)}</div>`:''}
          </td>
          <td>${uHasIssue?'<span class="signal signal-red" style="font-size:10px">🔴 특이</span>':'<span class="signal signal-green" style="font-size:10px">🟢 정상</span>'}</td>
          <td><div style="font-size:11px;font-weight:700;color:${uColor}">${uPct}%</div><div class="pct-bar"><div class="pct-fill" style="width:${uPct}%;background:${uColor}"></div></div></td>
          <td></td>
          ${uStageCells}
          <td style="text-align:left" onclick="event.stopPropagation()">${uNoteHtml}</td>
        </tr>`;
      });
    }
  });

  // 전체 합계 (표시 호기만)
  const allShownUnitsFiltered=allShownUnits.filter(u=>!(visibleUnits&&visibleUnits.has(u.id)));
  const totalCount=allShownUnitsFiltered.length;
  if(totalCount>0){
    const totalAvg=Math.round(allShownUnitsFiltered.reduce((s,u)=>s+(stagePct(u.id)),0)/totalCount);
    const totalColor=getProgressColor(totalAvg);
    let totalStageCells='';
    for(let s=1;s<=9;s++){
      const done=allShownUnitsFiltered.filter(u=>completedStagesByUnit[u.id]?.has(s)).length;
      const bg=done===totalCount?'#D1FAE5':done>0?'#FEF9C3':'#fff';
      totalStageCells+=`<td style="background:${bg}">${done>0?`<b>${done}/${totalCount}</b>`:'—'}</td>`;
      if(expandedStages.has(s)){
        (SUB_STAGES[s]||[]).forEach(sub=>{
          const subDone=allShownUnitsFiltered.filter(u=>u.subStages&&u.subStages.has(sub.id)).length;
          const subBg=subDone===totalCount?'#D1FAE5':subDone>0?'#EDE9FE':'#FAFAFA';
          totalStageCells+=`<td style="background:${subBg};border:1px solid #C4B5FD">${subDone>0?`<b style="color:#6D28D9">${subDone}/${totalCount}</b>`:'—'}</td>`;
        });
      }
    }
    rows+=`<tr class="total-row">
      <td class="td-left">전체</td><td></td>
      <td><div style="font-size:12px;font-weight:700;color:${totalColor}">${totalAvg}%</div><div class="pct-bar"><div class="pct-fill" style="width:${totalAvg}%;background:${totalColor}"></div></div></td>
      <td><b>${totalCount}</b></td>${totalStageCells}<td></td>
    </tr>`;
  }
  tbody.innerHTML=rows;
}

function renderAll(){
  const fabMap=buildFabMap();
  renderHeader();
  renderSummary(fabMap);
  if(currentUser) renderFabManagePanel(fabMap);
  renderTable(fabMap);
  // URL 잠금 배너
  const banner=document.getElementById('lock-banner');
  if(urlFabs&&urlFabs.length){
    banner.classList.remove('hidden');
    document.getElementById('lock-fabs').textContent=urlFabs.join(', ');
    document.getElementById('lock-unlock-btn').innerHTML=currentUser
      ?`<button class="btn btn-outline" style="padding:3px 8px;font-size:11px" onclick="unlockUrl()">잠금 해제</button>`:''
  } else {
    banner.classList.add('hidden');
  }
}

function unlockUrl(){
  urlFabs=null;
  const fabMap=buildFabMap();
  loadFabVisibility(fabMap).then(()=>renderAll());
  history.replaceState({},'',location.pathname);
}

// ── 이벤트 핸들러 ──
function toggleFab(fab){if(expandedFabs.has(fab))expandedFabs.delete(fab);else expandedFabs.add(fab);renderAll();}

async function toggleStageComplete(unitId, stage, complete){
  if(!currentUser)return;
  if(complete){
    await sb.from('stage_completions').upsert(
      {unit_id:unitId,stage,completed_at:new Date().toISOString()},
      {onConflict:'unit_id,stage'}
    );
    if(!completedStagesByUnit[unitId])completedStagesByUnit[unitId]=new Set();
    completedStagesByUnit[unitId].add(stage);
  } else {
    await sb.from('stage_completions').delete().eq('unit_id',unitId).eq('stage',stage);
    completedStagesByUnit[unitId]?.delete(stage);
  }
  renderAll();
}

// 호기 비고 핸들러
function startUnitNote(uid){const k=String(uid).replace(/[^a-zA-Z0-9]/g,'_');document.getElementById('unv-'+k).style.display='none';document.getElementById('une-'+k).style.display='block';}
function cancelUnitNote(uid){const k=String(uid).replace(/[^a-zA-Z0-9]/g,'_');document.getElementById('unv-'+k).style.display='block';document.getElementById('une-'+k).style.display='none';}
async function saveUnitNote(uid){
  if(!currentUser)return;
  const k=String(uid).replace(/[^a-zA-Z0-9]/g,'_');
  const note=document.getElementById('uni-'+k).value.trim();
  const has_issue=document.getElementById('uci-'+k).checked;
  const {error}=await sb.from('unit_notes').upsert({unit_id:uid,note,has_issue,updated_at:new Date().toISOString()},{onConflict:'unit_id'});
  if(!error){allUnitNotes[uid]={unit_id:uid,note,has_issue};renderAll();}
}

function startNote(fab){const k=fab.replace(/[^a-zA-Z0-9가-힣]/g,'_');document.getElementById('nv-'+k).style.display='none';document.getElementById('ne-'+k).style.display='block';}
function cancelNote(fab){const k=fab.replace(/[^a-zA-Z0-9가-힣]/g,'_');document.getElementById('nv-'+k).style.display='block';document.getElementById('ne-'+k).style.display='none';}
async function saveNote(fab){
  if(!currentUser)return;
  const k=fab.replace(/[^a-zA-Z0-9가-힣]/g,'_');
  const note=document.getElementById('ni-'+k).value.trim();
  const status=allFabStatus[fab]?.status||'green';
  const visible=allFabStatus[fab]?.visible!==false;
  const {error}=await sb.from('fab_status').upsert({...(allFabStatus[fab]||{}),fab,status,note,visible,updated_at:new Date().toISOString()},{onConflict:'fab'});
  if(!error){allFabStatus[fab]={...(allFabStatus[fab]||{}),fab,status,note,visible};renderAll();}
}

function startTarget(uid,s){document.getElementById(`tv-${uid}-${s}`).style.display='none';document.getElementById(`te-${uid}-${s}`).style.display='block';}
function cancelTarget(uid,s){document.getElementById(`tv-${uid}-${s}`).style.display='block';document.getElementById(`te-${uid}-${s}`).style.display='none';}
async function saveTarget(uid,s){
  if(!currentUser)return;
  const val=document.getElementById(`ti-${uid}-${s}`).value;
  const {error}=await sb.from('fab_targets').upsert({unit_id:uid,stage:s,target_date:val||null},{onConflict:'unit_id,stage'});
  if(!error){
    const idx=allTargets.findIndex(t=>t.unit_id===uid&&t.stage===s);
    if(idx>=0)allTargets[idx].target_date=val||null;
    else allTargets.push({unit_id:uid,stage:s,target_date:val||null});
    renderAll();
  }
}

// ── 초기화 ──
(async function init(){
  sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  urlFabs=getUrlFabs();
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user){currentUser=session.user;}
  updateAuthUI();
  await loadAll();
  const fabMap=buildFabMap();
  await loadFabVisibility(fabMap);
  document.getElementById('main-loading').classList.add('hidden');
  document.getElementById('main-content-area').classList.remove('hidden');
  renderAll();
  setInterval(async()=>{await loadAll();renderAll();},5*60*1000);
})();
</script>
