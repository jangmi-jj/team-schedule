<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팀 일정 관리</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4F46E5; --primary-light: #EEF2FF;
      --danger: #EF4444; --success: #10B981; --warning: #F59E0B;
      --bg: #F8FAFC; --card: #FFFFFF;
      --text: #1E293B; --muted: #94A3B8; --border: #E2E8F0;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .hidden { display: none !important; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #4338CA; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
    .btn-outline:hover { background: var(--primary-light); }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
    .btn-full { width: 100%; }
    input, select, textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #fff; color: var(--text); transition: border-color .15s; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 80px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .form-group { margin-bottom: 14px; }
    .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 20px; }
    .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }
    .success-msg { color: var(--success); font-size: 13px; margin-top: 8px; }

    /* 로그인 */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-box { width: 100%; max-width: 400px; }
    .login-box h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .login-box .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .login-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .login-tabs button { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border); background: transparent; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all .15s; }
    .login-tabs button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* 앱 레이아웃 */
    #app-screen { display: flex; flex-direction: column; min-height: 100vh; }
    .app-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 13px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .app-header h2 { font-size: 17px; font-weight: 800; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-chip { font-size: 12px; background: var(--primary-light); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-weight: 700; }
    .tab-nav { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; }
    .tab-nav button { flex: 1; min-width: 90px; padding: 13px 8px; border: none; background: transparent; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2.5px solid transparent; transition: all .15s; white-space: nowrap; }
    .tab-nav button.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-content { flex: 1; padding: 18px; max-width: 760px; width: 100%; margin: 0 auto; }

    /* 섹션 헤더 */
    .section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

    /* 작업 입력 */
    .stage-select option { font-weight: 600; }
    .progress-preview { margin-top: 8px; }
    .progress-bar-wrap { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 99px; background: var(--primary); transition: width .4s; }
    .progress-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* 작업 카드 */
    .log-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
    .log-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .log-card-left { display: flex; flex-direction: column; gap: 4px; }
    .log-badge { display: inline-flex; align-items: center; gap: 6px; }
    .stage-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: var(--primary-light); color: var(--primary); }
    .issue-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; background: #FEF3C7; color: #D97706; }
    .log-meta { font-size: 11px; color: var(--muted); }
    .log-content-text { font-size: 13px; line-height: 1.6; margin-bottom: 6px; }
    .log-issue-text { font-size: 12px; color: #D97706; background: #FEF9EE; padding: 6px 10px; border-radius: 8px; line-height: 1.5; }
    .log-detail-row { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-top: 6px; }
    .log-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 30px 0; }

    /* PJT 현황 */
    .pjt-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; cursor: pointer; transition: box-shadow .15s; }
    .pjt-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .pjt-card-header { padding: 16px; display: flex; align-items: center; gap: 12px; }
    .pjt-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .pjt-info { flex: 1; min-width: 0; }
    .pjt-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
    .pjt-progress-wrap { display: flex; align-items: center; gap: 10px; }
    .pjt-bar-wrap { flex: 1; background: var(--border); border-radius: 99px; height: 7px; overflow: hidden; }
    .pjt-bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }
    .pjt-pct { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 32px; text-align: right; }
    .pjt-stage-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .pjt-arrow { font-size: 14px; color: var(--muted); }
    .pjt-history { display: none; border-top: 1px solid var(--border); padding: 14px; background: #FAFAFA; }
    .pjt-history.open { display: block; }
    .history-item { padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: #fff; margin-bottom: 8px; }
    .history-item-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .history-author { font-size: 12px; font-weight: 700; color: var(--primary); }
    .history-date { font-size: 11px; color: var(--muted); }
    .history-stage { font-size: 11px; font-weight: 700; background: var(--primary-light); color: var(--primary); padding: 2px 7px; border-radius: 5px; margin-bottom: 6px; display: inline-block; }
    .history-content { font-size: 13px; line-height: 1.5; }
    .history-issue { font-size: 12px; color: #D97706; background: #FEF9EE; padding: 5px 9px; border-radius: 7px; margin-top: 5px; }

    /* 캘린더 */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-nav h3 { font-size: 16px; font-weight: 800; }
    .cal-nav button { padding: 6px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-size: 16px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 20px; }
    .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); padding: 4px 0; }
    .cal-day { text-align: center; padding: 6px 2px; border-radius: 10px; cursor: pointer; font-size: 13px; min-height: 44px; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: background .1s; }
    .cal-day:hover { background: var(--primary-light); }
    .cal-day.today { background: var(--primary); color: #fff; font-weight: 700; }
    .cal-day.today:hover { background: #4338CA; }
    .cal-day.selected { background: var(--primary-light); outline: 2px solid var(--primary); font-weight: 700; }
    .cal-day.other-month { color: var(--muted); }
    .cal-day.sunday { color: #EF4444; }
    .cal-day.sunday.today { color: #fff; }
    .cal-dots { display: flex; gap: 2px; justify-content: center; flex-wrap: wrap; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
    .cal-day.today .cal-dot { opacity: .8; }

    /* 할일 패널 */
    .todo-panel { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    .todo-panel-header { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--primary); }
    .todo-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .todo-input-row input { flex: 1; }
    .todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .todo-item:last-child { border-bottom: none; }
    .todo-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all .15s; }
    .todo-check.done { background: var(--success); border-color: var(--success); color: #fff; }
    .todo-text { flex: 1; font-size: 13px; line-height: 1.5; }
    .todo-text.done { text-decoration: line-through; color: var(--muted); }
    .todo-due { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .todo-del { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 2px; }

    /* PJT 관리 */
    .project-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; background: #fff; margin-bottom: 8px; cursor: pointer; transition: box-shadow .15s; }
    .project-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .project-item-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .project-item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-item-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .add-box { border: 2px dashed var(--border); border-radius: 12px; padding: 16px; margin-top: 16px; }
    .add-box h4 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .color-swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all .15s; }
    .color-swatch.selected { border-color: var(--text); transform: scale(1.1); }

    /* 모달 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    .modal-box { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    .modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions .btn { flex: 1; }

    .loading { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }
    @media (min-width: 600px) { .tab-content { padding: 24px; } }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen" class="hidden">
  <div class="login-box card">
    <h1>📋 팀 일정 관리</h1>
    <p class="sub">프로젝트별 작업을 함께 기록해요</p>
    <div class="login-tabs">
      <button class="active" onclick="switchLoginTab('signin')">로그인</button>
      <button onclick="switchLoginTab('signup')">회원가입</button>
    </div>
    <div id="signin-form">
      <div class="form-group"><label>이메일</label><input id="si-email" type="email" placeholder="이메일" /></div>
      <div class="form-group"><label>비밀번호</label><input id="si-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')signIn()" /></div>
      <button class="btn btn-primary btn-full" onclick="signIn()">로그인</button>
    </div>
    <div id="signup-form" class="hidden">
      <div class="form-group"><label>이름</label><input id="su-name" type="text" placeholder="팀에서 사용할 이름" /></div>
      <div class="form-group"><label>이메일</label><input id="su-email" type="email" placeholder="이메일" /></div>
      <div class="form-group"><label>비밀번호</label><input id="su-pw" type="password" placeholder="6자리 이상" /></div>
      <button class="btn btn-primary btn-full" onclick="signUp()">회원가입</button>
    </div>
    <p id="auth-error" class="error-msg"></p>
    <p id="auth-success" class="success-msg"></p>
  </div>
</div>

<!-- 앱 -->
<div id="app-screen" class="hidden">
  <div class="app-header">
    <h2>📋 팀 일정 관리</h2>
    <div class="header-right">
      <span class="user-chip" id="header-user"></span>
      <button class="btn btn-outline btn-sm" onclick="signOut()">로그아웃</button>
    </div>
  </div>
  <div class="tab-nav">
    <button class="active" onclick="switchTab('input')">✍️ 작업 입력</button>
    <button onclick="switchTab('status')">📊 PJT 현황</button>
    <button onclick="switchTab('calendar')">📅 캘린더</button>
    <button onclick="switchTab('issues')">🔧 이슈 관리</button>
    <button onclick="switchTab('projects')">🗂 PJT 관리</button>
  </div>

  <!-- 탭1: 작업 입력 -->
  <div id="tab-input" class="tab-content">
    <div class="card" style="margin-bottom:20px">
      <div class="section-title">오늘 작업 내용 입력</div>
      <div class="form-group">
        <label>작업자</label>
        <input id="log-author" type="text" readonly style="background:#F8FAFC;color:var(--muted)" />
      </div>
      <div class="form-group">
        <label>프로젝트 선택</label>
        <select id="log-project" onchange="onProjectChange()"></select>
      </div>
      <div class="form-group" id="unit-group">
        <label>호기 선택 <span style="font-weight:400;color:var(--muted)">(PJT 관리에서 호기를 먼저 추가해 주세요)</span></label>
        <select id="log-unit"><option value="">호기 선택 (선택사항)</option></select>
      </div>
      <div class="form-group">
        <label>작업 단계</label>
        <select id="log-stage" onchange="updateProgressPreview()">
          <option value="">단계 선택</option>
          <option value="1">1단계 - 납품/정위치</option>
          <option value="2">2단계 - 다이크/지진브라켓</option>
          <option value="3">3단계 - 전기 턴온</option>
          <option value="4">4단계 - 인터락테스트</option>
          <option value="5">5단계 - 유틸리티 턴온</option>
          <option value="6">6단계 - 설비안정화 및 구동</option>
          <option value="7">7단계 - 셋업평가</option>
          <option value="8">8단계 - 셋업보고서</option>
          <option value="9">9단계 - 종료</option>
        </select>
        <div class="progress-preview" id="progress-preview" style="display:none">
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
          <div class="progress-label" id="progress-label"></div>
        </div>
      </div>
      <div class="form-group">
        <label>작업 내용</label>
        <textarea id="log-content" placeholder="오늘 수행한 작업 내용을 입력해 주세요"></textarea>
      </div>
      <div class="form-group">
        <label>이슈 발생 구분 <span style="font-weight:400;color:var(--muted)">(이슈 없으면 선택 불필요)</span></label>
        <select id="log-issue-type">
          <option value="">구분 선택</option>
          <option value="하드웨어_원자재">하드웨어_원자재</option>
          <option value="하드웨어_휴먼">하드웨어_휴먼</option>
          <option value="소프트웨어">소프트웨어</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>이슈사항 <span style="font-weight:400;color:var(--muted)">(없으면 비워두세요)</span></label>
        <textarea id="log-issue" placeholder="작업 중 발생한 이슈를 입력해 주세요" style="min-height:60px"></textarea>
      </div>
      <div class="form-group">
        <label>날짜</label>
        <input type="date" id="log-date" />
      </div>
      <button class="btn btn-primary btn-full" onclick="submitLog()">작업 내용 저장</button>
      <p id="log-msg" style="margin-top:8px;font-size:13px"></p>
    </div>

    <div class="section-title">내 최근 작업</div>
    <div id="my-recent-logs"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- 탭2: PJT 현황 -->
  <div id="tab-status" class="tab-content hidden">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input id="status-search" type="text" placeholder="🔍 프로젝트 검색..." oninput="filterStatus()" style="flex:1" />
      <select id="status-sort" onchange="filterStatus()" style="width:auto;min-width:100px">
        <option value="name">이름순</option>
        <option value="progress">진척률순</option>
      </select>
    </div>
    <div id="status-list"><div class="loading">불러오는 중...</div></div>
  </div>

  <!-- 탭3: 캘린더 -->
  <div id="tab-calendar" class="tab-content hidden">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <h3 id="cal-title"></h3>
      <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="todo-panel" class="hidden" style="margin-bottom:20px"></div>

    <!-- 미해결 이슈 리스트 -->
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:15px;font-weight:700">⚠️ 미해결 이슈</span>
        <span id="issue-count" style="font-size:11px;background:#FEF3C7;color:#D97706;padding:2px 8px;border-radius:20px;font-weight:700"></span>
      </div>
      <div id="unresolved-issues"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- 이번 주 할일 리스트 -->
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:15px;font-weight:700">📋 이번 주 할 일</span>
        <span id="week-range" style="font-size:12px;color:var(--muted)"></span>
      </div>
      <div id="weekly-todos"><div class="loading">불러오는 중...</div></div>
    </div>

    <!-- 다음 주 할일 리스트 -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:15px;font-weight:700">📋 다음 주 할 일</span>
        <span id="next-week-range" style="font-size:12px;color:var(--muted)"></span>
      </div>
      <div id="next-weekly-todos"><div class="loading">불러오는 중...</div></div>
    </div>
  </div>

  <!-- 탭4: 이슈 관리 -->
  <div id="tab-issues" class="tab-content hidden">

    <!-- 차트 영역 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div class="card" style="padding:16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px">이슈 유형별</div>
        <canvas id="chart-type" height="180"></canvas>
      </div>
      <div class="card" style="padding:16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px">해결 현황</div>
        <canvas id="chart-resolved" height="180"></canvas>
      </div>
    </div>

    <!-- 필터 -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <select id="issue-filter-type" onchange="filterIssues()" style="flex:1;min-width:120px">
        <option value="">전체 유형</option>
        <option value="하드웨어_원자재">하드웨어_원자재</option>

  const email = document.getElementById('si-email').value.trim();
  const pw = document.getElementById('si-pw').value;

  const {data,error} = await sb.auth.signInWithPassword({email,password:pw});
  if (error) { setAuthErr('로그인 실패: '+error.message); return; }
  await onLoggedIn(data.user);
}

async function signUp() {
  const name = document.getElementById('su-name').value.trim();

  const pw = document.getElementById('su-pw').value;
  if (!name||!email||!pw) { setAuthErr('모든 항목을 입력해 주세요'); return; }

}

  const {data} = await sb.from('projects').select('*').order('created_at');

}

function loadProjectSelect() {
  const sel = document.getElementById('log-project');
  sel.innerHTML = projects.length
    ? projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')
    : '<option disabled>프로젝트를 먼저 추가해 주세요</option>';
  onProjectChange();
}

async function loadAllUnits() {
  const {data} = await sb.from('equipment_units').select('*').order('created_at');
  allUnits = data || [];
  unitsByProject = {};
  allUnits.forEach(u => {
    if (!unitsByProject[u.project_id]) unitsByProject[u.project_id] = [];
    unitsByProject[u.project_id].push(u);
  });
}

function onProjectChange() {
  const projectId = document.getElementById('log-project').value;
  const unitSel = document.getElementById('log-unit');
  const units = unitsByProject[projectId] || [];
  unitSel.innerHTML = units.length
    ? `<option value="">호기 선택 (선택사항)</option>` + units.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')
    : `<option value="">등록된 호기 없음 (PJT 관리에서 추가)</option>`;
}

function loadProjectList() {
  const el = document.getElementById('project-list');

function startEditProject(id, currentName) {
  const item = document.getElementById('pjt-item-'+id);

  const nameEl = item.querySelector('.project-item-name');

  document.getElementById('edit-pjt-'+id)?.focus();

async function saveEditProject(id) {

  const preview = document.getElementById('progress-preview');
  if (!stage) { preview.style.display='none'; return; }
  preview.style.display='block';
  const pct = STAGE_PROGRESS[stage];
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-label').textContent = `${STAGE_NAMES[stage]} → 진척률 ${pct}%`;
}

async function submitLog() {
  const projectId = document.getElementById('log-project').value;
  const stage = parseInt(document.getElementById('log-stage').value) || 0;
  const content = document.getElementById('log-content').value.trim();
  const issue = document.getElementById('log-issue')?.value.trim() || '';
  const issueType = document.getElementById('log-issue-type')?.value || '';
  const date = document.getElementById('log-date').value;

  if (!projectId) { showMsg('log-msg','프로젝트를 선택해 주세요',false); return; }
  if (!content) { showMsg('log-msg','작업 내용을 입력해 주세요',false); return; }

  const unitId = document.getElementById('log-unit')?.value || null;
  const {error} = await sb.from('work_logs').insert({
    project_id:projectId, user_id:currentUser.id,
    author_name:currentUserName, content, log_date:date,
    stage, issue, issue_type: issueType, unit_id: unitId,
  });
  if (error) { showMsg('log-msg','저장 실패: '+error.message,false); return; }

  document.getElementById('log-content').value='';
  if (document.getElementById('log-issue')) document.getElementById('log-issue').value='';
  if (document.getElementById('log-issue-type')) document.getElementById('log-issue-type').value='';
  document.getElementById('log-stage').value='';
  document.getElementById('progress-preview').style.display='none';
  showMsg('log-msg','저장됐어요! ✓',true);
  await loadMyRecentLogs();
}

// ── PJT 현황 ──
async function loadStatus() {
  const el = document.getElementById('status-list');
  el.innerHTML = '<div class="loading">불러오는 중...</div>';

  const {data:logs} = await sb.from('work_logs').select('project_id,stage');
  const maxStageMap = {};
  (logs||[]).forEach(l => {
    if (!l.stage) return;
    if (!maxStageMap[l.project_id] || l.stage > maxStageMap[l.project_id])
      maxStageMap[l.project_id] = l.stage;
  });

  statusData = projects.map(p => ({
    ...p,
    stage: maxStageMap[p.id] || 0,
    pct: STAGE_PROGRESS[maxStageMap[p.id] || 0] || 0,
  }));

  // 전역 진척률 맵 업데이트
  projectProgressMap = {};
  statusData.forEach(p => { projectProgressMap[p.id] = p.pct; });

  filterStatus();
}

function filterStatus() {
  const q = (document.getElementById('status-search')?.value || '').toLowerCase();
  const sort = document.getElementById('status-sort')?.value || 'name';
  const el = document.getElementById('status-list');
  if (!el) return;

  let list = statusData.filter(p => p.name.toLowerCase().includes(q));
  if (sort === 'progress') list = [...list].sort((a,b) => b.pct - a.pct);
  else list = [...list].sort((a,b) => a.name.localeCompare(b.name, 'ko'));

  if (!list.length) { el.innerHTML='<p class="log-empty">검색 결과가 없어요</p>'; return; }

  el.innerHTML = list.map(p => {
    const stageName = p.stage ? `${p.stage}단계 - ${STAGE_NAMES[p.stage]}` : '시작 전';
    const units = unitsByProject[p.id] || [];
    const color = getProgressColor(p.pct);
    const statusLabel = getProgressLabel(p.pct);
    return `
    <div class="pjt-card">
      <div class="pjt-card-header" onclick="togglePjtCard('${p.id}',this.closest('.pjt-card'))">
        <div class="pjt-dot" style="background:${color}"></div>
        <div class="pjt-info">
          <div class="pjt-name">${escHtml(p.name)}</div>
          <div class="pjt-progress-wrap">
            <div class="pjt-bar-wrap"><div class="pjt-bar-fill" style="width:${p.pct}%;background:${color}"></div></div>
            <div class="pjt-pct" style="color:${color}">${p.pct}%</div>
          </div>
          <div class="pjt-stage-label">${stageName} · 호기 ${units.length}개
            <span style="margin-left:6px;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:${color}20;color:${color}">${statusLabel}</span>
          </div>
        </div>
        <div class="pjt-arrow">▼</div>
      </div>
      <div class="pjt-history" id="hist-${p.id}"></div>
    </div>`;
  }).join('');
}

async function togglePjtCard(projectId, card) {
  const panel = document.getElementById('hist-'+projectId);
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  const arrow = card.querySelector('.pjt-arrow');
  if (arrow) arrow.textContent = isOpen ? '▼' : '▲';
  if (isOpen) return;

  const pct = projectProgressMap[projectId] || 0;
  const color = getProgressColor(pct);
  const units = unitsByProject[projectId] || [];

  if (units.length > 0) {
    panel.innerHTML = `
      <div style="padding:12px 14px">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
          <button class="unit-tab active" onclick="event.stopPropagation();loadUnitHistory('${projectId}',null,this)"
            style="padding:5px 12px;border-radius:20px;border:1.5px solid ${color};background:${color};color:#fff;font-size:12px;font-weight:700;cursor:pointer">
            전체
          </button>
          ${units.map(u=>`
            <button class="unit-tab" onclick="event.stopPropagation();loadUnitHistory('${projectId}','${u.id}',this)"
              style="padding:5px 12px;border-radius:20px;border:1.5px solid ${color};background:#fff;color:${color};font-size:12px;font-weight:700;cursor:pointer;text-align:left">
              <div>${escHtml(u.name)}</div>
              ${(u.fab||u.location)?`<div style="font-size:10px;font-weight:400;opacity:.8">${[u.fab,u.location].filter(Boolean).join(' · ')}</div>`:''}
            </button>`).join('')}
        </div>
        <div id="unit-hist-${projectId}"><div class="loading">불러오는 중...</div></div>
      </div>`;
    await loadUnitHistory(projectId, null, panel.querySelector('.unit-tab'));
  } else {
    panel.innerHTML = `<div style="padding:12px 14px"><div id="unit-hist-${projectId}"><div class="loading">불러오는 중...</div></div></div>`;
    await loadUnitHistory(projectId, null, null);
  }
}

async function loadUnitHistory(projectId, unitId, btn) {
  // 탭 활성화
  if (btn) {
    const pct = projectProgressMap[projectId] || 0;
    const color = getProgressColor(pct);
    btn.closest('.pjt-history')?.querySelectorAll('.unit-tab').forEach(b => {
      b.style.background = '#fff';
      b.style.color = color;
    });
    if (btn.classList.contains('unit-tab')) {
      btn.style.background = color;
      btn.style.color = '#fff';
    }
  }

  const histEl = document.getElementById('unit-hist-'+projectId);
  if (!histEl) return;
  histEl.innerHTML = '<div class="loading">불러오는 중...</div>';

  let query = sb.from('work_logs').select('*, equipment_units(name)')
    .eq('project_id', projectId)
    .order('log_date',{ascending:false})
    .order('created_at',{ascending:false})
    .limit(30);

  if (unitId) query = query.eq('unit_id', unitId);

  const {data} = await query;
  if (!data||!data.length) { histEl.innerHTML='<p class="log-empty">작업 기록이 없어요</p>'; return; }

  histEl.innerHTML = data.map(log=>`
    <div class="history-item">
      <div class="history-item-header">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="history-author">${escHtml(log.author_name||'')}</span>
          ${log.equipment_units?.name ? `<span style="font-size:11px;background:#F1F5F9;padding:1px 6px;border-radius:4px">${escHtml(log.equipment_units.name)}</span>` : ''}
        </div>
        <span class="history-date">${log.log_date}</span>
      </div>
      ${log.stage?`<span class="history-stage">${log.stage}단계 - ${STAGE_NAMES[log.stage]} (${STAGE_PROGRESS[log.stage]}%)</span>`:''}
      ${log.equipment?`<div style="font-size:11px;color:var(--muted);margin-bottom:4px">📍 ${escHtml(log.equipment)}</div>`:''}
      <div class="history-content">${escHtml(log.content)}</div>
      ${log.issue?`<div class="history-issue">⚠️ ${escHtml(log.issue)}</div>`:''}
      ${log.customer_manager?`<div style="font-size:11px;color:var(--muted);margin-top:4px">👤 ${escHtml(log.customer_manager)}</div>`:''}
    </div>`).join('');
}

// ── 캘린더 ──
async function loadCalendar() {
  await fetchCalendarData();
  renderCalendar();
  renderTodoPanel(selectedDate);
  await loadUnresolvedIssues();
  await loadWeeklyTodos();
  await loadNextWeekTodos();
}

async function fetchCalendarData() {
  const firstDay = `${calYear}-${String(calMonth+1).padStart(2,'0')}-01`;
  const lastDay = new Date(calYear, calMonth+1, 0);
  const lastDayStr = toDateStr(lastDay);

  const {data:todos} = await sb.from('todos')
    .select('*')
    .gte('due_date', firstDay)
    .lte('due_date', lastDayStr)
    .order('due_date');

  calTodoData = {};
  (todos||[]).forEach(t => {
    if (!calTodoData[t.due_date]) calTodoData[t.due_date] = [];
    calTodoData[t.due_date].push(t);
  });

  const {data:logs} = await sb.from('work_logs')
    .select('log_date,issue,issue_resolved')
    .gte('log_date', firstDay)
    .lte('log_date', lastDayStr);

  calLogDates = new Set((logs||[]).map(l=>l.log_date));
  calIssueDates = new Set(
    (logs||[]).filter(l=>l.issue && !l.issue_resolved).map(l=>l.log_date)
  );
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = `${calYear}년 ${calMonth+1}월`;
  const grid = document.getElementById('cal-grid');
  const dows = ['일','월','화','수','목','금','토'];
  const today = toDateStr(new Date());

  let html = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  for (let i=0; i<startDow; i++) {
    const d = prevDays - startDow + 1 + i;
    html += `<div class="cal-day other-month"><span>${d}</span></div>`;
  }

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr===today;
    const isSelected = dateStr===selectedDate;
    const dow = (startDow + d - 1) % 7;
    const isSun = dow===0;

    let cls = 'cal-day';
    if (isToday) cls+=' today';
    else if (isSelected) cls+=' selected';
    if (isSun) cls+=' sunday';

    const hasTodos = calTodoData[dateStr]?.length > 0;
    const hasLogs = calLogDates.has(dateStr);
    const hasIssue = calIssueDates.has(dateStr);
    const dots = [
      hasTodos ? `<div class="cal-dot" style="background:#10B981"></div>` : '',
      hasLogs ? `<div class="cal-dot" style="background:#4F46E5"></div>` : '',
      hasIssue ? `<div class="cal-dot" style="background:#F59E0B"></div>` : '',
    ].join('');

    html += `<div class="${cls}" onclick="selectCalDate('${dateStr}')">
      <span>${d}</span>
      ${dots?`<div class="cal-dots">${dots}</div>`:''}
    </div>`;
  }

  const remain = (7 - (startDow + daysInMonth) % 7) % 7;
  for (let i=1; i<=remain; i++) {
    html += `<div class="cal-day other-month"><span>${i}</span></div>`;
  }

  grid.innerHTML = html;
}

function selectCalDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  renderTodoPanel(dateStr);
}

async function renderTodoPanel(dateStr) {
  const panel = document.getElementById('todo-panel');
  panel.classList.remove('hidden');

  const todos = calTodoData[dateStr] || [];
  const logs = calLogDates.has(dateStr) ? '있음' : '';

  panel.innerHTML = `
    <div class="todo-panel">
      <div class="todo-panel-header">📅 ${formatDateKo(dateStr)}</div>
      <div class="todo-input-row">
        <input id="todo-input" type="text" placeholder="할 일 추가..." onkeydown="if(event.key==='Enter')addTodo('${dateStr}')" />
        <button class="btn btn-primary btn-sm" onclick="addTodo('${dateStr}')">추가</button>
      </div>
      <div id="todo-list">
        ${todos.length===0
          ? '<p style="font-size:13px;color:var(--muted);text-align:center;padding:12px 0">등록된 할 일이 없어요</p>'
          : todos.map(t=>renderTodoItem(t, dateStr)).join('')
        }
      </div>
      ${logs?`<div style="margin-top:12px;padding:8px 12px;background:var(--primary-light);border-radius:8px;font-size:12px;color:var(--primary)">📌 이 날 작업 기록이 있어요</div>`:''}
    </div>`;
}

function toggleIssueType() {
  const issue = document.getElementById('log-issue')?.value.trim();
  const group = document.getElementById('issue-type-group');
  if (issue) group?.classList.remove('hidden');
  else group?.classList.add('hidden');
}

function renderTodoItem(t, dateStr) {
  return `
    <div class="todo-item" id="todo-${t.id}">
      <div class="todo-check ${t.is_done?'done':''}" onclick="toggleTodo('${t.id}','${dateStr}',${!t.is_done})">
        ${t.is_done?'✓':''}
      </div>
      <div style="flex:1;min-width:0">
        <div class="todo-text ${t.is_done?'done':''}">${escHtml(t.title)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap">
          <span>작성: ${escHtml(t.author_name||'')}</span>
          ${t.is_done && t.checked_by ? `<span style="color:var(--success)">✓ ${escHtml(t.checked_by)}</span>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button onclick="startEditTodo('${t.id}','${dateStr}',\`${escHtml(t.title)}\`)"
          style="background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--muted);font-size:11px;padding:3px 7px">수정</button>
        <button class="todo-del" onclick="deleteTodo('${t.id}','${dateStr}')">✕</button>
      </div>
    </div>`;
}

async function addTodo(dateStr) {
  const input = document.getElementById('todo-input');
  const title = input.value.trim();
  if (!title) return;

  const {error} = await sb.from('todos').insert({
    title, due_date: dateStr,
    user_id: currentUser.id, author_name: currentUserName,
  });
  if (error) { alert('추가 실패: '+error.message); return; }
  input.value = '';
  await fetchCalendarData();
  renderCalendar();
  renderTodoPanel(dateStr);
}

async function toggleTodo(id, dateStr, isDone) {
  const updateData = {
    is_done: isDone,
    checked_by: isDone ? currentUserName : null,
    checked_at: isDone ? new Date().toISOString() : null,
  };
  await sb.from('todos').update(updateData).eq('id',id);
  await fetchCalendarData();
  renderCalendar();
  renderTodoPanel(dateStr);
  await loadWeeklyTodos();
  await loadNextWeekTodos();
}

async function deleteTodo(id, dateStr) {
  await sb.from('todos').delete().eq('id',id);
  await fetchCalendarData();
  renderCalendar();
  renderTodoPanel(dateStr);
  await loadWeeklyTodos();
}

function startEditTodo(id, dateStr, currentTitle) {
  const item = document.getElementById('todo-'+id);
  if (!item) return;
  item.innerHTML = `
    <div style="display:flex;gap:8px;width:100%;align-items:center">
      <input id="edit-todo-${id}" type="text" value="${currentTitle}"
        style="flex:1;padding:6px 10px;border:1.5px solid var(--primary);border-radius:8px;font-size:13px"
        onkeydown="if(event.key==='Enter')saveEditTodo('${id}','${dateStr}')" />
      <button onclick="saveEditTodo('${id}','${dateStr}')"
        style="padding:6px 12px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:12px;font-weight:700;cursor:pointer">저장</button>
      <button onclick="renderTodoPanel('${dateStr}')"
        style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;cursor:pointer">취소</button>
    </div>`;
  document.getElementById('edit-todo-'+id)?.focus();
}

async function saveEditTodo(id, dateStr) {
  const input = document.getElementById('edit-todo-'+id);
  const title = input?.value.trim();
  if (!title) return;
  await sb.from('todos').update({title}).eq('id',id);
  await fetchCalendarData();
  renderCalendar();
  renderTodoPanel(dateStr);
  await loadWeeklyTodos();
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth=0; calYear++; }
  if (calMonth < 0) { calMonth=11; calYear--; }
  loadCalendar();
}

// ── 미해결 이슈 리스트 ──
async function loadUnresolvedIssues() {
  const el = document.getElementById('unresolved-issues');
  const {data} = await sb.from('work_logs')
    .select('*, projects(name,color)')
    .not('issue', 'is', null)
    .neq('issue', '')
    .eq('issue_resolved', false)
    .order('log_date', {ascending:false});

  const countEl = document.getElementById('issue-count');
  if (!data||!data.length) {
    countEl.textContent = '없음';
    el.innerHTML = '<p style="font-size:13px;color:var(--muted);text-align:center;padding:16px 0">미해결 이슈가 없어요 👍</p>';
    return;
  }
  countEl.textContent = data.length + '건';
  el.innerHTML = data.map(log=>`
    <div style="background:#fff;border:1px solid #FDE68A;border-radius:12px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
            <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:${log.projects?.color}20;color:${log.projects?.color}">${escHtml(log.projects?.name||'')}</span>
            <span style="font-size:11px;color:var(--muted)">${log.log_date} · ${escHtml(log.author_name||'')}</span>
          </div>
          <div style="font-size:13px;color:#D97706;font-weight:600;margin-bottom:2px">⚠️ ${escHtml(log.issue)}</div>
          ${log.equipment?`<div style="font-size:11px;color:var(--muted)">📍 ${escHtml(log.equipment)}</div>`:''}
        </div>
        <button onclick="resolveIssue('${log.id}')"
          style="flex-shrink:0;padding:5px 10px;border-radius:8px;border:1.5px solid #10B981;background:#fff;color:#10B981;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">
          ✓ 해결
        </button>
      </div>
    </div>`).join('');
}

async function resolveIssue(id) {
  await sb.from('work_logs').update({issue_resolved:true}).eq('id',id);
  await fetchCalendarData();
  renderCalendar();
  await loadUnresolvedIssues();
  // 이슈 관리 탭이 열려있으면 같이 갱신
  if (!document.getElementById('tab-issues').classList.contains('hidden')) {
    await fetchAllIssues();
  }
}

// ── 주간 할일 리스트 ──
async function loadWeeklyTodos() {
  const el = document.getElementById('weekly-todos');
  const rangeEl = document.getElementById('week-range');

  const today = new Date();
  const dow = today.getDay();
  const mon = new Date(today); mon.setDate(today.getDate() - (dow===0?6:dow-1));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);

  const monStr = toDateStr(mon);
  const sunStr = toDateStr(sun);
  rangeEl.textContent = `${mon.getMonth()+1}/${mon.getDate()} ~ ${sun.getMonth()+1}/${sun.getDate()}`;

  const {data} = await sb.from('todos')
    .select('*')
    .gte('due_date', monStr)
    .lte('due_date', sunStr)
    .order('due_date').order('is_done');

  if (!data||!data.length) {
    el.innerHTML='<p style="font-size:13px;color:var(--muted);text-align:center;padding:16px 0">이번 주 등록된 할 일이 없어요</p>';
    return;
  }

  // 날짜별 그룹
  const DOW_KO = ['일','월','화','수','목','금','토'];
  const grouped = {};
  data.forEach(t=>{
    if (!grouped[t.due_date]) grouped[t.due_date]=[];
    grouped[t.due_date].push(t);
  });

  el.innerHTML = Object.entries(grouped).map(([date,todos])=>{
    const d = new Date(date+'T00:00:00');
    const isToday = date===toDateStr(new Date());
    const label = `${d.getMonth()+1}/${d.getDate()} (${DOW_KO[d.getDay()]})`;
    const doneCnt = todos.filter(t=>t.is_done).length;
    return `
    <div style="background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden">
      <div style="padding:10px 14px;background:${isToday?'var(--primary-light)':'#F8FAFC'};display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;font-weight:700;color:${isToday?'var(--primary)':'var(--text)'}">${label}${isToday?' · 오늘':''}</span>
        <span style="font-size:11px;color:var(--muted)">${doneCnt}/${todos.length} 완료</span>
      </div>
      ${todos.map(t=>`
        <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--border)">
          <div class="todo-check ${t.is_done?'done':''}" onclick="toggleTodo('${t.id}','${date}',${!t.is_done})">${t.is_done?'✓':''}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;${t.is_done?'text-decoration:line-through;color:var(--muted)':''}">${escHtml(t.title)}</div>
            <div style="font-size:10px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;margin-top:2px">
              <span>작성: ${escHtml(t.author_name||'')}</span>
              ${t.is_done&&t.checked_by?`<span style="color:var(--success)">✓ ${escHtml(t.checked_by)}</span>`:''}
            </div>
          </div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

// ── 다음 주 할일 리스트 ──
async function loadNextWeekTodos() {
  const el = document.getElementById('next-weekly-todos');
  const rangeEl = document.getElementById('next-week-range');

  const today = new Date();
  const dow = today.getDay();
  const thisMonday = new Date(today); thisMonday.setDate(today.getDate() - (dow===0?6:dow-1));
  const nextMon = new Date(thisMonday); nextMon.setDate(thisMonday.getDate() + 7);
  const nextSun = new Date(nextMon); nextSun.setDate(nextMon.getDate() + 6);

  const monStr = toDateStr(nextMon);
  const sunStr = toDateStr(nextSun);
  rangeEl.textContent = `${nextMon.getMonth()+1}/${nextMon.getDate()} ~ ${nextSun.getMonth()+1}/${nextSun.getDate()}`;

  const {data} = await sb.from('todos')
    .select('*')
    .gte('due_date', monStr)
    .lte('due_date', sunStr)
    .order('due_date').order('is_done');

  if (!data||!data.length) {
    el.innerHTML='<p style="font-size:13px;color:var(--muted);text-align:center;padding:16px 0">다음 주 등록된 할 일이 없어요</p>';
    return;
  }

  const DOW_KO = ['일','월','화','수','목','금','토'];
  const grouped = {};
  data.forEach(t=>{
    if (!grouped[t.due_date]) grouped[t.due_date]=[];
    grouped[t.due_date].push(t);
  });

  el.innerHTML = Object.entries(grouped).map(([date,todos])=>{
    const d = new Date(date+'T00:00:00');
    const label = `${d.getMonth()+1}/${d.getDate()} (${DOW_KO[d.getDay()]})`;
    const doneCnt = todos.filter(t=>t.is_done).length;
    return `
    <div style="background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden">
      <div style="padding:10px 14px;background:#F8FAFC;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;font-weight:700">${label}</span>
        <span style="font-size:11px;color:var(--muted)">${doneCnt}/${todos.length} 완료</span>
      </div>
      ${todos.map(t=>`
        <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--border)">
          <div class="todo-check ${t.is_done?'done':''}" onclick="toggleTodo('${t.id}','${date}',${!t.is_done})">${t.is_done?'✓':''}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;${t.is_done?'text-decoration:line-through;color:var(--muted)':''}">${escHtml(t.title)}</div>
            <div style="font-size:10px;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;margin-top:2px">
              <span>작성: ${escHtml(t.author_name||'')}</span>
              ${t.is_done&&t.checked_by?`<span style="color:var(--success)">✓ ${escHtml(t.checked_by)}</span>`:''}
            </div>
          </div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

// ── 호기 관리 ──
async function openUnitModal(projectId, projectName) {
  currentUnitProjectId = projectId;
  document.getElementById('unit-modal-title').textContent = `⚙️ ${projectName} · 호기 관리`;
  document.getElementById('unit-modal').classList.remove('hidden');
  document.getElementById('new-unit-name').value = '';
  renderUnitList();
}

function closeUnitModal() {
  document.getElementById('unit-modal').classList.add('hidden');
  currentUnitProjectId = null;
}

function renderUnitList() {
  const units = unitsByProject[currentUnitProjectId] || [];
  const el = document.getElementById('unit-list');
  if (!units.length) {
    el.innerHTML = '<p style="font-size:13px;color:var(--muted);text-align:center;padding:8px 0">등록된 호기가 없어요</p>';
    return;
  }
  el.innerHTML = units.map(u=>`
    <div id="unit-row-${u.id}" style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;margin-bottom:3px">${escHtml(u.name)}</div>
          <div style="font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap">
            ${u.fab ? `<span>FAB: <strong style="color:var(--text)">${escHtml(u.fab)}</strong></span>` : ''}
            ${u.location ? `<span>위치: <strong style="color:var(--text)">${escHtml(u.location)}</strong></span>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          <button onclick="startEditUnit('${u.id}','${escHtml(u.name)}','${escHtml(u.fab||'')}','${escHtml(u.location||'')}')"
            style="padding:4px 10px;border-radius:7px;border:1px solid var(--border);background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:var(--text)">수정</button>
          <button onclick="deleteUnit('${u.id}')" class="btn btn-danger btn-sm">삭제</button>
        </div>
      </div>
    </div>`).join('');
}

function unitDisplayName(u) {
  const parts = [u.name];
  if (u.fab) parts.push(`FAB: ${u.fab}`);
  if (u.location) parts.push(u.location);
  return parts.join(' · ');
}

async function addUnit() {
  const name = document.getElementById('new-unit-name').value.trim();
  const fab = document.getElementById('new-unit-fab').value.trim();
  const location = document.getElementById('new-unit-location').value.trim();
  if (!name || !currentUnitProjectId) { showMsg('unit-msg','호기 ID/S/N을 입력해 주세요',false); return; }
  const {error} = await sb.from('equipment_units').insert({
    project_id: currentUnitProjectId, name, fab, location
  });
  if (error) { showMsg('unit-msg','추가 실패: '+error.message,false); return; }
  document.getElementById('new-unit-name').value = '';
  document.getElementById('new-unit-fab').value = '';
  document.getElementById('new-unit-location').value = '';
  await loadAllUnits();
  renderUnitList();
  loadProjectList();
  showMsg('unit-msg','추가됐어요!',true);
}

async function deleteUnit(unitId) {
  await sb.from('equipment_units').delete().eq('id',unitId);
  await loadAllUnits();
  renderUnitList();
  loadProjectList();
}

function startEditUnit(id, name, fab, location) {
  const row = document.getElementById('unit-row-'+id);
  if (!row) return;
  row.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
      <div>
        <label style="font-size:10px;color:var(--muted)">호기 ID / S/N</label>
        <input id="eu-name-${id}" type="text" value="${name}" style="padding:6px 10px;font-size:12px" />
      </div>
      <div>
        <label style="font-size:10px;color:var(--muted)">FAB</label>
        <input id="eu-fab-${id}" type="text" value="${fab}" style="padding:6px 10px;font-size:12px" />
      </div>
    </div>
    <div style="margin-bottom:8px">
      <label style="font-size:10px;color:var(--muted)">세부 위치</label>
      <input id="eu-loc-${id}" type="text" value="${location}" style="padding:6px 10px;font-size:12px"
        onkeydown="if(event.key==='Enter')saveEditUnit('${id}')" />
    </div>
    <div style="display:flex;gap:6px">
      <button onclick="saveEditUnit('${id}')"
        style="flex:1;padding:6px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:12px;font-weight:700;cursor:pointer">저장</button>
      <button onclick="renderUnitList()"
        style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;cursor:pointer">취소</button>
    </div>`;
  document.getElementById('eu-name-'+id)?.focus();
}

async function saveEditUnit(id) {
  const name = document.getElementById('eu-name-'+id)?.value.trim();
  const fab = document.getElementById('eu-fab-'+id)?.value.trim();
  const location = document.getElementById('eu-loc-'+id)?.value.trim();
  if (!name) { alert('호기 ID/S/N을 입력해 주세요'); return; }
  const {error} = await sb.from('equipment_units').update({name, fab, location}).eq('id',id);
  if (error) { alert('수정 실패: '+error.message); return; }
  await loadAllUnits();
  renderUnitList();
  loadProjectList();
}

// ── 색상 선택기 ──
// 색상 선택기 제거됨 (진척률 기준 자동 색상)

// ── 이슈 관리 ──
let allIssues = [];
let issueChartType = null;
let issueChartResolved = null;

async function loadIssuesTab() {
  const sel = document.getElementById('issue-filter-project');
  sel.innerHTML = `<option value="">전체 프로젝트</option>` +
    projects.map(p=>`<option value="${p.id}">${escHtml(p.name)}</option>`).join('');
  await fetchAllIssues();
}

async function fetchAllIssues() {
  const {data} = await sb.from('work_logs')
    .select('*, projects(name), equipment_units(name,fab,location)')
    .not('issue','is',null)
    .neq('issue','')
    .order('created_at',{ascending:false});
  allIssues = data || [];
  filterIssues();
  renderIssueCharts();
}

function filterIssues() {
  const typeF = document.getElementById('issue-filter-type')?.value || '';
  const resolvedF = document.getElementById('issue-filter-resolved')?.value || '';
  const projF = document.getElementById('issue-filter-project')?.value || '';

  let list = allIssues.filter(i => {
    if (typeF && i.issue_type !== typeF) return false;
    if (resolvedF !== '' && String(i.issue_resolved) !== resolvedF) return false;
    if (projF && i.project_id !== projF) return false;
    return true;
  });

  const el = document.getElementById('issue-list');
  if (!list.length) { el.innerHTML='<p class="log-empty">등록된 이슈가 없어요<br><span style="font-size:12px;color:var(--muted)">작업 입력 시 이슈사항을 입력하면 자동으로 등록돼요</span></p>'; return; }

  const TYPE_COLOR = {
    '하드웨어_원자재':'#EF4444','하드웨어_휴먼':'#F59E0B',
    '소프트웨어':'#4F46E5','기타':'#94A3B8'
  };

  el.innerHTML = `
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="background:#F8FAFC;border-bottom:2px solid var(--border)">
          <th style="padding:10px 12px;text-align:left;font-size:12px;color:var(--muted);white-space:nowrap">상태</th>
          <th style="padding:10px 12px;text-align:left;font-size:12px;color:var(--muted);white-space:nowrap">프로젝트</th>
          <th style="padding:10px 12px;text-align:left;font-size:12px;color:var(--muted);white-space:nowrap">호기</th>
          <th style="padding:10px 12px;text-align:left;font-size:12px;color:var(--muted);white-space:nowrap">이슈 유형</th>
          <th style="padding:10px 12px;text-align:left;font-size:12px;color:var(--muted)">이슈 내용</th>
          <th style="padding:10px 12px;text-align:left;font-size:12px;color:var(--muted);white-space:nowrap">등록자 · 일자</th>
        </tr>
      </thead>
      <tbody>
        ${list.map(i=>`
        <tr style="border-bottom:1px solid var(--border);background:${i.issue_resolved?'#fff':'#FFFBF0'}">
          <td style="padding:10px 12px;white-space:nowrap">
            <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:${i.issue_resolved?'#D1FAE5':'#FEF3C7'};color:${i.issue_resolved?'#10B981':'#D97706'}">
              ${i.issue_resolved?'✓ 해결':'미해결'}
            </span>
          </td>
          <td style="padding:10px 12px;font-size:12px;color:var(--muted);white-space:nowrap">${escHtml(i.projects?.name||'-')}</td>
          <td style="padding:10px 12px;font-size:12px;white-space:nowrap">
            ${i.equipment_units?.name?`<div style="font-weight:600">${escHtml(i.equipment_units.name)}</div>
            <div style="font-size:10px;color:var(--muted)">${[i.equipment_units.fab,i.equipment_units.location].filter(Boolean).join(' · ')}</div>`:'-'}
          </td>
          <td style="padding:10px 12px;white-space:nowrap">
            ${i.issue_type?`<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:${TYPE_COLOR[i.issue_type]||'#94A3B8'}20;color:${TYPE_COLOR[i.issue_type]||'#94A3B8'}">${escHtml(i.issue_type)}</span>`:'-'}
          </td>
          <td style="padding:10px 12px;line-height:1.5">${escHtml(i.issue)}</td>
          <td style="padding:10px 12px;font-size:11px;color:var(--muted);white-space:nowrap">
            ${escHtml(i.author_name||'')} · ${i.log_date||''}
            ${i.issue_resolved?`<div style="color:var(--success);margin-top:2px">해결완료</div>`:''}
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>`;
}

function renderIssueCharts() {
  const types = ['하드웨어_원자재','하드웨어_휴먼','소프트웨어','기타'];
  const typeCounts = types.map(t=>allIssues.filter(i=>i.issue_type===t).length);
  const typeColors = ['#EF4444','#F59E0B','#4F46E5','#94A3B8'];

  if (issueChartType) issueChartType.destroy();
  const ctxType = document.getElementById('chart-type');
  if (ctxType) issueChartType = new Chart(ctxType, {
    type:'bar',
    data:{labels:types,datasets:[{data:typeCounts,backgroundColor:typeColors,borderRadius:6}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}},responsive:true}
  });

  const resolved = allIssues.filter(i=>i.issue_resolved).length;
  const unresolved = allIssues.length - resolved;
  if (issueChartResolved) issueChartResolved.destroy();
  const ctxRes = document.getElementById('chart-resolved');
  if (ctxRes) issueChartResolved = new Chart(ctxRes, {
    type:'doughnut',
    data:{labels:['해결 완료','미해결'],datasets:[{data:[resolved,unresolved],backgroundColor:['#10B981','#F59E0B'],borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom'}},responsive:true}
  });
}

// ── 모달 ──
let _modalCallback = null;
function showModal(title, body, cb) {
  _modalCallback = cb;
  const modal = document.getElementById('confirm-modal');
  modal.querySelector('.modal-box').innerHTML = `
    <h3>${title}</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">${body}</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-danger" onclick="_modalCallback && _modalCallback()">확인</button>
    </div>`;
  modal.classList.remove('hidden');
}
function closeModal() { document.getElementById('confirm-modal').classList.add('hidden'); }

// ── 유틸 ──
function toDateStr(d) { return d.toISOString().split('T')[0]; }
function formatDateKo(s) { const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showMsg(id, msg, ok) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.color = ok ? 'var(--success)' : 'var(--danger)';
  setTimeout(()=>{ el.textContent=''; }, 3000);
}

// ── 시작 ──
(async function init() {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const {data:{session}} = await sb.auth.getSession();
  if (session?.user) await onLoggedIn(session.user);
  else show('login-screen');
  sb.auth.onAuthStateChange((_e,session)=>{
    if (!session && !document.getElementById('app-screen').classList.contains('hidden')) location.reload();
  });
})();
</script>
